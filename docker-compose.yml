services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nevo
      POSTGRES_PASSWORD: nevo
      POSTGRES_DB: nevo_test_drive
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nevo -d nevo_test_drive"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://nevo:nevo@postgres:5432/nevo_test_drive
      PORT: 3000
      NODE_ENV: production
    ports:
      - "3000:3000"
    volumes:
      - ./backend/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_TARGET: http://backend:3000
      NODE_ENV: production
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
